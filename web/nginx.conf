server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The SPA calls same-origin /api (matching the dev Vite proxy). Forward it to the
    # casino server so the session cookie stays first-party (no CORS needed). Using the
    # Docker DNS resolver + a variable upstream means nginx boots even if casino-server
    # isn't up yet (it resolves per-request instead of at startup). $request_uri keeps
    # the /api prefix, which the server's routes expect.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $casino_upstream casino-server:4100;
        proxy_pass http://$casino_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
